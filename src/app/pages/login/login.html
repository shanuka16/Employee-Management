<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Login - Employee Management</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
		<style>
			body { min-height:100vh; display:flex; align-items:center; justify-content:center; background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); }
			.login-card { width:100%; max-width:420px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.2); overflow:hidden; }
			.brand { background:linear-gradient(90deg,#fff 0%,rgba(255,255,255,0.9) 100%); padding:24px; text-align:center; }
			.brand h2 { margin:0; font-weight:700; color:#4b2b82; }
			.form-section { padding:28px; background:#fff; }
			.social-btn { width:48%; }
			.divider { text-align:center; margin:10px 0 20px; color:#9aa0b4; }
		</style>
	</head>
	<body>
		<main class="login-card animate__animated animate__fadeInDown">
			<div class="card">
				<div class="brand">
					<h2 class="animate__animated animate__zoomIn">Employee Manageme</h2>
					<small class="text-muted">Sign in to continue</small>
				</div>
				<div class="form-section">
					<form>
						<div class="mb-3">
							<label for="email" class="form-label">Email address</label>
							<input type="email" [(ngModel)]="loginObj.email" name="email" class="form-control form-control-lg" id="email" placeholder="name@example.com">
						</div>
						<div class="mb-3">
							<label for="password" class="form-label">Password</label>
							<input type="text" [(ngModel)]="loginObj.state" name="state" class="form-control form-control-lg" id="password" placeholder="Enter your password">
						</div>
						<div class="d-flex justify-content-between align-items-center mb-3">
							<div class="form-check">
								<input class="form-check-input" type="checkbox" id="remember">
								<label class="form-check-label" for="remember">Remember me</label>
							</div>
							<a href="#" class="small">Forgot?</a>
						</div>
						<div class="d-grid mb-3">
							<button type="button" (click)="onLogin()" class="btn btn-primary btn-lg animate__animated animate__pulse">Sign In</button>
						</div>
						<div class="divider">or continue with</div>
						<div class="d-flex gap-2">
							<button type="button" class="btn btn-outline-secondary social-btn w-100">Google</button>
							<button type="button" class="btn btn-outline-secondary social-btn w-100">GitHub</button>
						</div>
						<p class="text-center small mt-3 mb-0">Don't have an account? <a href="#">Register</a></p>
					</form>
				</div>
			</div>
		</main>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
