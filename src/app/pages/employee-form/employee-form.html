<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Form</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">

<div class="container my-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0">Employee Registration</h5>
    </div>

    <div class="card-body">

      <!-- Personal Information -->
      <h6 class="text-primary border-bottom pb-2 mb-3">Personal Information</h6>
      <div class="row mb-3">
        
        <div class="col-md-8">
          <label class="form-label">Full Name</label>
          <input type="text" [(ngModel)]="newEmployeeObj.name" class="form-control" placeholder="Enter full name">
        </div>
      </div>

      <!-- Contact Information -->
      <h6 class="text-primary border-bottom pb-2 mb-3">Contact Information</h6>
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Contact Number</label>
          <input type="number" [(ngModel)]="newEmployeeObj.contactNo" class="form-control" placeholder="10 digit contact number">
        </div>
        <div class="col-md-6">
          <label class="form-label">Email Address</label>
          <input type="email" [(ngModel)]="newEmployeeObj.email" class="form-control" placeholder="example@email.com">
        </div>
      </div>

      <!-- Address Details -->
      <h6 class="text-primary border-bottom pb-2 mb-3">Address Details</h6>
      <div class="row mb-3">
        <div class="col-md-12">
          <label class="form-label">Address</label>
          <textarea [disabled]="loggedEmpData.role != 'HR'" [(ngModel)]="newEmployeeObj.address" class="form-control" rows="2" placeholder="Enter address"></textarea>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4">
          <label class="form-label">City</label>
          <input [disabled]="loggedEmpData.role !== 'HR'" type="text" [(ngModel)]="newEmployeeObj.city" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">State</label>
          <input [disabled]="loggedEmpData.role !== 'HR'" type="text" [(ngModel)]="newEmployeeObj.state" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">Pin Code</label>
          <input [disabled]="loggedEmpData.role !== 'HR'" type="text" [(ngModel)]="newEmployeeObj.pinCode" class="form-control">
        </div>
      </div>

      <!-- Work Information -->
      <h6 class="text-primary border-bottom pb-2 mb-3">Work Information</h6>
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Designation</label>
          <select [disabled]="loggedEmpData.role !== 'HR'" class="form-select" [(ngModel)]="newEmployeeObj.designationId" required>
            <option value="" disabled selected>-- Select Designation --</option>
            @for (desig of $designationList | async; track $index) {
                <option [value]="desig.designationId">{{desig.departmentName}} / {{desig.designationName}}</option>
            }
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Role</label>
          <select [disabled]="loggedEmpData.role !== 'HR'" class="form-select" [(ngModel)]="newEmployeeObj.role">
            <option selected>-- Select Role --</option>
            <option>HR</option>
            <option>Employee</option>
          </select>
        </div>
      </div>

      <div class="col-md-8">
          <label class="form-label">Password</label>
          <input type="text" [(ngModel)]="newEmployeeObj.password" class="form-control" placeholder="Enter password">
      </div>



      <!-- Buttons -->
      <div class="text-end">
        <button class="btn btn-secondary me-2">Reset</button>

        @if (newEmployeeObj.employeeId == 0) {
          <button type="button" class="btn btn-primary" (click)="onSaveEmp()">Save Employee</button>
        } @else{
          <button type="button" class="btn btn-warning" (click)="onSaveEmp()">Update Employee</button>
        }
         
      </div>

    </div>
  </div>
</div>

</body>
</html>
